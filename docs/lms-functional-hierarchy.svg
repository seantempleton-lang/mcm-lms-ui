<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" role="img" aria-labelledby="title desc">
  <title id="title">McMillan LMS functional hierarchy</title>
  <desc id="desc">Functional diagram showing shared login, learner, supervisor, and administrator interactions in the LMS.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#486277"/>
    </marker>
    <style>
      .canvas { fill: #f5f7fa; }
      .title { font: 700 32px Arial, sans-serif; fill: #152838; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #5d6b78; }
      .section { fill: #ffffff; stroke: #cdd8e2; stroke-width: 2; }
      .section-title { font: 700 21px Arial, sans-serif; fill: #172b3c; }
      .section-note { font: 400 13px Arial, sans-serif; fill: #657483; }
      .root { fill: #22384b; stroke: #22384b; }
      .root-text { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .box { fill: #ffffff; stroke: #9eb0bf; stroke-width: 1.8; }
      .box-green { fill: #e9f7ef; stroke: #54a46c; }
      .box-blue { fill: #e8f2ff; stroke: #5b8fc8; }
      .box-gold { fill: #fff4dc; stroke: #c79b39; }
      .box-red { fill: #fdeceb; stroke: #c96b63; }
      .box-purple { fill: #f1ecff; stroke: #8a6fd1; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #182b3b; }
      .box-text { font: 400 12px Arial, sans-serif; fill: #405263; }
      .small { font: 400 12px Arial, sans-serif; fill: #536474; }
      .flow { fill: none; stroke: #486277; stroke-width: 2; marker-end: url(#arrow); }
      .flow-soft { fill: none; stroke: #7a8d9d; stroke-width: 1.8; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .label { font: 700 11px Arial, sans-serif; fill: #486277; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="1080"/>
  <text x="60" y="54" class="title">McMillan LMS Functional Hierarchy</text>
  <text x="60" y="82" class="subtitle">What users do in the software, grouped by hierarchy level and role.</text>

  <rect x="610" y="112" width="280" height="72" rx="10" class="root"/>
  <text x="750" y="155" text-anchor="middle" class="root-text">LMS Functionality</text>

  <rect x="60" y="220" width="1380" height="130" rx="14" class="section"/>
  <text x="92" y="256" class="section-title">Shared Entry Layer</text>
  <text x="92" y="278" class="section-note">Every user starts here before the app opens role-specific functionality.</text>

  <rect x="210" y="292" width="190" height="42" rx="8" class="box box-red"/>
  <text x="305" y="319" text-anchor="middle" class="box-title">Login</text>
  <rect x="480" y="292" width="230" height="42" rx="8" class="box box-red"/>
  <text x="595" y="319" text-anchor="middle" class="box-title">Load user and role</text>
  <rect x="790" y="292" width="230" height="42" rx="8" class="box box-red"/>
  <text x="905" y="319" text-anchor="middle" class="box-title">Dashboard</text>
  <rect x="1100" y="292" width="190" height="42" rx="8" class="box box-red"/>
  <text x="1195" y="319" text-anchor="middle" class="box-title">Role routing</text>

  <path d="M750 184 V220" class="flow"/>
  <path d="M400 313 H480" class="flow"/>
  <path d="M710 313 H790" class="flow"/>
  <path d="M1020 313 H1100" class="flow"/>

  <rect x="60" y="390" width="420" height="600" rx="14" class="section"/>
  <text x="92" y="426" class="section-title">Learner Workflow</text>
  <text x="92" y="448" class="section-note">Self-service learning and personal training record.</text>

  <rect x="135" y="485" width="270" height="52" rx="8" class="box box-green"/>
  <text x="270" y="506" text-anchor="middle" class="box-title">Launch module</text>
  <text x="270" y="526" text-anchor="middle" class="box-text">open assigned learning</text>

  <rect x="135" y="552" width="270" height="52" rx="8" class="box"/>
  <text x="270" y="573" text-anchor="middle" class="box-title">Update progress</text>
  <text x="270" y="593" text-anchor="middle" class="box-text">start or continue module</text>

  <rect x="135" y="619" width="270" height="52" rx="8" class="box"/>
  <text x="270" y="640" text-anchor="middle" class="box-title">Add notes</text>
  <text x="270" y="660" text-anchor="middle" class="box-text">record learner comments</text>

  <rect x="135" y="686" width="270" height="52" rx="8" class="box"/>
  <text x="270" y="707" text-anchor="middle" class="box-title">Take quiz</text>
  <text x="270" y="727" text-anchor="middle" class="box-text">capture score and attempts</text>

  <rect x="135" y="753" width="270" height="52" rx="8" class="box box-green"/>
  <text x="270" y="774" text-anchor="middle" class="box-title">Submit for review</text>
  <text x="270" y="794" text-anchor="middle" class="box-text">send completion to supervisor</text>

  <rect x="135" y="820" width="270" height="52" rx="8" class="box box-green"/>
  <text x="270" y="841" text-anchor="middle" class="box-title">View history</text>
  <text x="270" y="861" text-anchor="middle" class="box-text">completed modules and awards</text>

  <rect x="135" y="887" width="270" height="52" rx="8" class="box box-green"/>
  <text x="270" y="908" text-anchor="middle" class="box-title">Personal learning record</text>
  <text x="270" y="928" text-anchor="middle" class="box-text">status counts and competencies</text>

  <path d="M270 537 V552" class="flow"/>
  <path d="M270 604 V619" class="flow"/>
  <path d="M270 671 V686" class="flow"/>
  <path d="M270 738 V753" class="flow"/>
  <path d="M270 805 V820" class="flow"/>
  <path d="M270 872 V887" class="flow"/>

  <rect x="540" y="390" width="420" height="600" rx="14" class="section"/>
  <text x="572" y="426" class="section-title">Supervisor Workflow</text>
  <text x="572" y="448" class="section-note">Assigns, reviews, assesses, and awards operational competency.</text>

  <rect x="585" y="485" width="155" height="54" rx="8" class="box box-blue"/>
  <text x="662" y="506" text-anchor="middle" class="box-title">Required Training</text>
  <text x="662" y="526" text-anchor="middle" class="box-text">individual assignments</text>
  <rect x="760" y="485" width="155" height="54" rx="8" class="box box-blue"/>
  <text x="838" y="506" text-anchor="middle" class="box-title">Sessions</text>
  <text x="838" y="526" text-anchor="middle" class="box-text">facilitated learning</text>

  <rect x="575" y="570" width="150" height="64" rx="8" class="box"/>
  <text x="650" y="596" text-anchor="middle" class="box-title">Assign module</text>
  <text x="650" y="616" text-anchor="middle" class="box-text">learner plus module</text>
  <rect x="775" y="570" width="150" height="64" rx="8" class="box"/>
  <text x="850" y="596" text-anchor="middle" class="box-title">Create session</text>
  <text x="850" y="616" text-anchor="middle" class="box-text">date, location, project</text>

  <rect x="575" y="665" width="150" height="64" rx="8" class="box"/>
  <text x="650" y="691" text-anchor="middle" class="box-title">Review queue</text>
  <text x="650" y="711" text-anchor="middle" class="box-text">filter by status</text>
  <rect x="775" y="665" width="150" height="64" rx="8" class="box"/>
  <text x="850" y="691" text-anchor="middle" class="box-title">Attendance</text>
  <text x="850" y="711" text-anchor="middle" class="box-text">search and mark present</text>

  <rect x="575" y="760" width="150" height="64" rx="8" class="box box-blue"/>
  <text x="650" y="786" text-anchor="middle" class="box-title">Approve</text>
  <text x="650" y="806" text-anchor="middle" class="box-text">award mapped comps</text>
  <rect x="775" y="760" width="150" height="64" rx="8" class="box box-blue"/>
  <text x="850" y="786" text-anchor="middle" class="box-title">Assess</text>
  <text x="850" y="806" text-anchor="middle" class="box-text">competent/follow-up</text>

  <rect x="585" y="865" width="330" height="64" rx="8" class="box box-purple"/>
  <text x="750" y="891" text-anchor="middle" class="box-title">Reference and reporting</text>
  <text x="750" y="911" text-anchor="middle" class="box-text">modules, competencies, matrix, learner reports</text>

  <path d="M662 539 V570" class="flow"/>
  <path d="M838 539 V570" class="flow"/>
  <path d="M650 634 V665" class="flow"/>
  <path d="M850 634 V665" class="flow"/>
  <path d="M650 729 V760" class="flow"/>
  <path d="M850 729 V760" class="flow"/>
  <path d="M650 824 C650 845, 750 845, 750 865" class="flow"/>
  <path d="M850 824 C850 845, 750 845, 750 865" class="flow"/>

  <rect x="1020" y="390" width="420" height="600" rx="14" class="section"/>
  <text x="1052" y="426" class="section-title">Administrator Workflow</text>
  <text x="1052" y="448" class="section-note">Maintains system setup, users, content, and resources.</text>

  <rect x="1065" y="485" width="155" height="54" rx="8" class="box box-gold"/>
  <text x="1142" y="506" text-anchor="middle" class="box-title">Users</text>
  <text x="1142" y="526" text-anchor="middle" class="box-text">accounts and roles</text>
  <rect x="1240" y="485" width="155" height="54" rx="8" class="box box-gold"/>
  <text x="1318" y="506" text-anchor="middle" class="box-title">Modules</text>
  <text x="1318" y="526" text-anchor="middle" class="box-text">learning catalogue</text>

  <rect x="1055" y="570" width="150" height="64" rx="8" class="box"/>
  <text x="1130" y="596" text-anchor="middle" class="box-title">Create/edit</text>
  <text x="1130" y="616" text-anchor="middle" class="box-text">name, username, role</text>
  <rect x="1255" y="570" width="150" height="64" rx="8" class="box"/>
  <text x="1330" y="596" text-anchor="middle" class="box-title">Module details</text>
  <text x="1330" y="616" text-anchor="middle" class="box-text">title, category, mode</text>

  <rect x="1055" y="665" width="150" height="64" rx="8" class="box"/>
  <text x="1130" y="691" text-anchor="middle" class="box-title">Passwords</text>
  <text x="1130" y="711" text-anchor="middle" class="box-text">reset temporary</text>
  <rect x="1255" y="665" width="150" height="64" rx="8" class="box"/>
  <text x="1330" y="691" text-anchor="middle" class="box-title">Competencies</text>
  <text x="1330" y="711" text-anchor="middle" class="box-text">map/create evidence</text>

  <rect x="1055" y="760" width="150" height="64" rx="8" class="box"/>
  <text x="1130" y="786" text-anchor="middle" class="box-title">Resources</text>
  <text x="1130" y="806" text-anchor="middle" class="box-text">open, copy, delete</text>
  <rect x="1255" y="760" width="150" height="64" rx="8" class="box"/>
  <text x="1330" y="786" text-anchor="middle" class="box-title">Slide builder</text>
  <text x="1330" y="806" text-anchor="middle" class="box-text">slides, media, links</text>

  <rect x="1085" y="865" width="290" height="64" rx="8" class="box box-gold"/>
  <text x="1230" y="891" text-anchor="middle" class="box-title">Publish LMS content foundation</text>
  <text x="1230" y="911" text-anchor="middle" class="box-text">quizzes, previews, modules, mappings, files</text>

  <path d="M1142 539 V570" class="flow"/>
  <path d="M1318 539 V570" class="flow"/>
  <path d="M1130 634 V665" class="flow"/>
  <path d="M1330 634 V665" class="flow"/>
  <path d="M1130 729 V760" class="flow"/>
  <path d="M1330 729 V760" class="flow"/>
  <path d="M1130 824 C1130 845, 1230 845, 1230 865" class="flow"/>
  <path d="M1330 824 C1330 845, 1230 845, 1230 865" class="flow"/>

  <path d="M1195 334 C1195 365, 270 365, 270 485" class="flow-soft"/>
  <path d="M1195 334 C1195 365, 750 365, 750 485" class="flow-soft"/>
  <path d="M1195 334 C1195 365, 1230 365, 1230 485" class="flow-soft"/>
  <text x="790" y="373" text-anchor="middle" class="label">dashboard exposes features based on role</text>

  <path d="M1230 929 C1230 1030, 750 1030, 750 929" class="flow-soft"/>
  <text x="990" y="1020" text-anchor="middle" class="label">admin content enables supervisor assignment and assessment</text>
  <path d="M750 929 C750 1010, 270 1010, 270 929" class="flow-soft"/>
  <text x="510" y="1000" text-anchor="middle" class="label">approved reviews and sessions update learner records</text>
</svg>
